name: Build TapDone APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Set Gradle wrapper version
        run: |
          cd android
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2.1-bin.zip
networkTimeout=120000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS
          chmod +x gradlew

      - name: Download Gradle with retry
        run: |
          cd android
          for i in 1 2 3 4 5; do
            echo "Gradle download attempt $i..."
            ./gradlew --version && break || sleep 20
          done

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --max-workers=2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TapDone-debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
